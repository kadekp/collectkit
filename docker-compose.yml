services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  receiver:
    build:
      context: ./examples/receiver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
      WEBHOOK_SHARED_SECRET: ${WEBHOOK_SHARED_SECRET:-}
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://bot:bot@postgres:5432/bot
      MESSAGING_PROVIDER: ${MESSAGING_PROVIDER:-null}
      # New Relic is optional — skip it in local dev to keep startup fast.
    # Override the default newrelic-admin command for local dev:
    command: ["python", "-m", "src.worker"]
    ports:
      - "8080:8080"
    healthcheck:
      # Use a Python one-liner because the slim base image has no curl/wget.
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/live', timeout=2).status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
